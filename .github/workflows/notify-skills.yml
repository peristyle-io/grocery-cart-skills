name: Notify skills.sh

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'skills/**'
      - 'README.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger skills.sh re-index
        run: npx skills add peristyle-io/grocery-cart-skills --yes --all
